<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Produk | Zelta Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        @media (max-width: 480px) {
        body { padding-top: 60px !important; }
        .navbar { padding: 5px 15px !important; }
        .logo { font-size: 16px !important; }
        .nav-links li a { font-size: 11px !important; padding: 4px 6px !important; }
        .card { padding: 20px !important; }
}
        
        :root { --bg-color: #05060a; --accent-neon: #00f2ff; --card-bg: #0f1118; }
        body { background: var(--bg-color); color: white; padding: 40px 20px; display: flex; justify-content: center; font-family: 'Poppins', sans-serif; }
        
        .container { 
            max-width: 500px; width: 100%; background: var(--card-bg); 
            padding: 30px; border-radius: 15px; border: 1px solid #1e293b; 
        }

        .img-preview { 
            width: 100%; height: 200px; background: #161b22; 
            border-radius: 10px; margin-bottom: 20px; display: flex; 
            align-items: center; justify-content: center; border: 1px dashed var(--accent-neon);
        }

        h2 { color: var(--accent-neon); margin-bottom: 5px; }
        .price { font-size: 1.3rem; font-weight: 600; margin-bottom: 15px; }
        .desc { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }

        .qris-box { 
            background: white; width: 160px; height: 160px; margin: 20px auto; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: black; border: 2px solid var(--accent-neon);
        }

        /* Kolom input yang sudah rapi dan pas */
        
        input, select { 
            width: 100%; 
            padding: 12px 16px; 
            margin: 8px 0; 
            background: #05060a; 
            border: 1px solid #1e293b; 
            color: white; 
            border-radius: 10px; 
            outline: none;
            box-sizing: border-box; 
            display: block;
        }
        
        .btn-pay { 
            width: 100%; padding: 14px; background: transparent; 
            border: 1px solid var(--accent-neon); border-radius: 10px; font-weight: 600; 
            cursor: pointer; color: var(--accent-neon); margin-top: 15px;
            transition: 0.3s;
        }
        .btn-pay:hover { background: var(--accent-neon); color: black; }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--accent-neon); text-decoration: none; font-size: 0.85rem; }

        
    </style>
</head>
<body>
      
    <nav class="navbar">
        <a href="index.html" class="logo">Dikz.Web</a>
        <ul class="nav-links">
            <li><a href="tools.html"><i class="fa-solid fa-house-user"></i> Home</a></li>
            <li class="dropdown">
                <a href="#" class="dropbtn"><i class="fa-solid fa-share-nodes"></i> Social Media <i class="fa-solid fa-arrow-down"></i></a>
                <div class="dropdown-content">
                    <a href="https://www.instagram.com/dik.whydn?igsh=MTRkbHQxcnlxb20zOQ==" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram ⤶</a>
                    <a href="https://www.tiktok.com/@fdikiwahyudin?_t=ZS-90j4WsXjA87&_r=1" target="_blank"><i class="fa-brands fa-tiktok"></i> Tiktok ⤶</a>
                    <a href="https://www.facebook.com/share/1D2dwnJ7a6/" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook ⤶</a>
                    <a href="https://t.me/ZeltaSparkle" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram ⤶</a>
                </div>
            </li>
            <li class="dropdown">
                <a href="#" class="dropbtn"><i class="fa-solid fa-medal"></i> About Me <i class="fa-solid fa-arrow-down"></i></a>
                <div class="dropdown-content">
                    <a href="CONTACT.html"><i class="fa-solid fa-envelope"></i> Contact Me!</a>
                    <a href="Portofolio.html"><i class="fa-solid fa-user"></i> Portofolio</a>
                    <a href="RATING.html"><i class="fa-solid fa-star-half-stroke"></i> Rating</a>
                    <a href="DONATE.html"><i class="fa-solid fa-hand-holding-medical"></i> Support Me </a>
                </div>
            </li>
        </ul>
    </nav>

    
    <div class="container">
        <div class="img-preview">PREVIEW ASSET</div>
        <h2 id="prodName">Loading...</h2>
        <div class="price" id="prodPrice">Rp 0</div>
        <p class="desc">Deskripsi: File digital premium kualitas tinggi, siap pakai untuk kebutuhan kreatifmu.</p>
        
        <div class="qris-box">QRIS CODE</div>
        
        <input type="text" id="name" placeholder="Nama lengkap kamu..." required>
        <input type="email" id="email" placeholder="Email untuk terima file..." required>
        <select id="payment"><option>QRIS (Instan)</option><option>DANA</option></select>
        
        <button class="btn-pay" onclick="validateAndPay()">Bayar Sekarang</button>
        <a href="tools.html" class="back-link">← Kembali ke Toko</a>
    </div>

    <script>
        function validateAndPay() {
            const name = document.getElementById('name');
            const email = document.getElementById('email');
            
            if (!name.value) {
                alert('Nama lengkap jangan dikosongin ya, Flutter!');
                name.style.borderColor = '#ff4d4d';
                return;
            }
            if (!email.value || !email.value.includes('@')) {
                alert('Mohon masukkan email yang valid ya!');
                email.style.borderColor = '#ff4d4d';
                name.style.borderColor = '#1e293b'; // reset warna nama
                return;
            }
            
            // Jika sukses
            name.style.borderColor = '#1e293b';
            email.style.borderColor = '#1e293b';
            alert('Terima kasih ' + name.value + '! Pembayaran sedang diproses.');
        }

        const params = new URLSearchParams(window.location.search);
        document.getElementById('prodName').innerText = params.get('name') || "Produk Tidak Ditemukan";
        document.getElementById('prodPrice').innerText = "Rp " + parseInt(params.get('price')).toLocaleString();
    </script>
</body>
</html>
