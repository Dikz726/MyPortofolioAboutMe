<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kritik, Saran & Rating - Web Aneh v2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @media (max-width: 480px) {
        body { padding-top: 60px !important; }
        .navbar { padding: 5px 15px !important; }
        .logo { font-size: 16px !important; }
        .nav-links li a { font-size: 11px !important; padding: 4px 6px !important; }
        .card { padding: 20px !important; }
}
        :root {
            --bg-color: #05060a;       
            --accent-neon: #00f2ff;    
            --accent-purple: #bc13fe;  
            --card-bg: rgba(20, 20, 20, 0.8); 
            --text-main: #ffffff;      
            --text-dim: #8a8a8a;
            --star-color: #ffb800;
            --primary-color: var(--accent-purple); /* Penyelarasan warna menu dropdown */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* Ditambahkan padding atas agar posisi kartu pas di bawah navbar */
        body {
            background-color: var(--bg-color); color: var(--text-main);
            min-height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px;
            padding-top: 90px; 
            overflow-x: hidden;
        }

        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(188, 19, 254, 0.08) 0%, var(--bg-color) 85%); z-index: -1;
        }

        /* ============================================================
           CSS NAVBAR UTAMA (WARISAN FLUTTER 🔥)
           ============================================================ */
        .navbar {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            z-index: 1000;  
            background: rgba(5, 6, 10, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
            margin-left: 10px; 
            transition: 0.3s;
        }
        .logo:hover {
            color: var(--accent-neon);
            text-shadow: 0 0 10px var(--accent-neon);
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            margin-right: 10px; 
        }

        .nav-links li {
            position: relative;
            margin-left: 15px; 
        }

        .nav-links li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 12px; 
            display: block;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.1s; 
            transform: none; 
            box-shadow: none;
        }

        .nav-links li a:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.03); 
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .dropdown {
            position: relative;
        }

        .dropdown-content {
            max-height: 0; 
            opacity: 0; 
            visibility: hidden; 
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out, visibility 0.4s;
            position: absolute;
            min-width: 180px;
            top: 100%; 
            right: 0; 
            margin-top: 5px;
            background: rgba(20, 20, 20, 0.9); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.5);
            z-index: 100;
            border-radius: 8px;
            overflow: hidden; 
        }

        .dropdown:hover .dropdown-content {
            max-height: 500px; 
            opacity: 1; 
            visibility: visible; 
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
            transition: background-color 0.2s;
        }

        .dropdown-content a:hover {
            background-color: var(--primary-color); 
            color: white;
            text-shadow: 0 0 5px #fff;
        }

        /* ============================================================
           CSS CARD KONTEN FORM + ANIMASI BARU 🚀
           ============================================================ */
        .section-container { width: 100%; max-width: 550px; margin: auto; }
        
        .card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 25px;
            margin-top: 20px;
            
            /* Penerapan Animasi Muncul & Efek Denyut Glow */
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards, pulseGlow 4s ease-in-out infinite alternate;
            opacity: 0; /* Mulai dari transparan sebelum animasi jalan */
        }

        /* KEYFRAMES ANIMASI KOTAK MUNCUL */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* KEYFRAMES ANIMASI GLOW MENYALA (EFEK NAPAS CYBERPUNK) */
        @keyframes pulseGlow {
            0% {
                border-color: rgba(255, 255, 255, 0.08);
                box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 15px rgba(188, 19, 254, 0.05);
            }
            100% {
                border-color: rgba(0, 242, 255, 0.2);
                box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 25px rgba(0, 242, 255, 0.15);
            }
        }

        .header-wrapper {
            text-align: center; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); padding-bottom: 20px;
        }
        .header-wrapper h1 { font-size: 1.6rem; font-weight: 800; margin-top: 5px; }
        .accent-neon { color: var(--accent-neon); text-shadow: 0 0 10px var(--accent-neon); }
        .tag {
            display: inline-block; background: rgba(188, 19, 254, 0.1); color: var(--accent-purple);
            padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; border: 1px solid rgba(188, 19, 254, 0.2);
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-label { font-size: 0.9rem; font-weight: 600; color: #e0e0e0; }
        
        .custom-input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 18px; border-radius: 12px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .custom-input:focus { border-color: var(--accent-neon); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 15px rgba(0, 242, 255, 0.15); }
        
        textarea.custom-input { resize: none; min-height: 110px; }

        .stars-container { display: flex; gap: 12px; font-size: 2.2rem; margin: 5px 0; }
        .stars-container i { cursor: pointer; color: rgba(255, 255, 255, 0.15); transition: 0.2s ease; }
        .stars-container i:hover, .stars-container i.active {
            color: var(--star-color); filter: drop-shadow(0 0 10px var(--star-color));
        }

        .btn-submit-neon {
            width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent-purple);
            color: white; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.4s;
            display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px;
        }
        .btn-submit-neon:hover { background: var(--accent-purple); box-shadow: 0 0 25px var(--accent-purple); transform: translateY(-2px); }

        .back-link { text-align: center; font-size: 0.85rem; margin-top: 5px; }
        .back-link a { color: var(--accent-neon); text-decoration: none; transition: 0.3s; }
        .back-link a:hover { text-shadow: 0 0 8px var(--accent-neon); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="video-overlay"></div>

    <nav class="navbar">
        <a href="index.html" class="logo">Dikz.Web</a>
        <ul class="nav-links">
            <li><a href="tools.html"><i class="fa-solid fa-house-user"></i> Home</a></li>
            <li class="dropdown">
                <a href="#" class="dropbtn"><i class="fa-solid fa-share-nodes"></i> Social Media <i class="fa-solid fa-arrow-down"></i></a>
                <div class="dropdown-content">
                    <a href="https://www.instagram.com/dik.whydn?igsh=MTRkbHQxcnlxb20zOQ==" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram ⤶</a>
                    <a href="https://www.tiktok.com/@fdikiwahyudin?_t=ZS-90j4WsXjA87&_r=1" target="_blank"><i class="fa-brands fa-tiktok"></i> Tiktok ⤶</a>
                    <a href="https://www.facebook.com/share/1D2dwnJ7a6/" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook ⤶</a>
                    <a href="https://t.me/ZeltaSparkle" target="_blank"><i class="fa-brands fa-telegram"></i> Telegram ⤶</a>
                </div>
            </li>
            <li class="dropdown">
                <a href="#" class="dropbtn"><i class="fa-solid fa-medal"></i> About Me <i class="fa-solid fa-arrow-down"></i></a>
                <div class="dropdown-content">
                    <a href="CONTACT.html"><i class="fa-solid fa-envelope"></i> Contact Me!</a>
                    <a href="Portofolio.html"><i class="fa-solid fa-user"></i> Portofolio</a>
                    <a href="RATING.html"><i class="fa-solid fa-star-half-stroke"></i> Rating</a>
                    <a href="DONATE.html"><i class="fa-solid fa-hand-holding-medical"></i> Support Me </a>
                </div>
            </li>
        </ul>
    </nav>

    <main class="section-container">
        <div class="card">
            
            <div class="header-wrapper">
                <span class="tag">Poin Progres 8 🔥</span>
                <h1>Kritik, Saran & <span class="accent-neon">Rating</span></h1>
            </div>

            <form action="https://api.web3forms.com/submit" method="POST" id="feedbackForm">
                
                <input type="hidden" name="access_key" value="3f422e90-6e23-4f5a-843c-b20ae85ed991">
                
                <input type="hidden" name="subject" value="🔥 Notifikasi Kritik & Rating Baru Web Aneh!">
                <input type="hidden" name="from_name" value="Web Aneh Engine">

                <div class="form-group" style="margin-bottom: 15px;">
                    <label class="form-label"><i class="fas fa-user accent-neon"></i> Nama / Anonim :</label>
                    <input type="text" name="Nama_Pengunjung" class="custom-input" placeholder="Masukkan nama kamu..." required>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label class="form-label"><i class="fas fa-star accent-neon"></i> Berikan Rating Kamu :</label>
                    <div class="stars-container" id="starsContainer">
                        <i class="fas fa-star" data-value="1" onclick="selectStar(1)"></i>
                        <i class="fas fa-star" data-value="2" onclick="selectStar(2)"></i>
                        <i class="fas fa-star" data-value="3" onclick="selectStar(3)"></i>
                        <i class="fas fa-star" data-value="4" onclick="selectStar(4)"></i>
                        <i class="fas fa-star" data-value="5" onclick="selectStar(5)"></i>
                    </div>
                    <input type="hidden" name="Rating_Bintang" id="ratingValue" value="0">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label"><i class="fas fa-comment-dots accent-neon"></i> Kritik & Saran Pesan :</label>
                    <textarea name="Kritik_dan_Saran" class="custom-input" placeholder="Tulis masukan, kritik gila, atau saran membangun kamu di sini..." required></textarea>
                </div>

                <button type="submit" class="btn-submit-neon">
                    Kirim Kritik & Rating <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div class="back-link">
                <a href="tools.html"><i class="fas fa-arrow-left"></i> MENU</a>
            </div>

        </div>
    </main>

    <script>
        let currentSelectedRating = 0;
        const ratingValueInput = document.getElementById('ratingValue');

        function selectStar(value) {
            currentSelectedRating = value;
            ratingValueInput.value = value + " Bintang"; 
            
            const stars = document.querySelectorAll('#starsContainer i');
            stars.forEach(star => {
                const starValue = parseInt(star.getAttribute('data-value'));
                if (starValue <= value) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        document.getElementById('feedbackForm').onsubmit = function(e) {
            if (currentSelectedRating === 0) {
                alert("Flutter, pilih bintang ratingnya dulu dong sebelum di-kirim! 😉⭐");
                return false;
            }
        };
    </script>
</body>
