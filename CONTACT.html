:root {

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {

.navbar {

.logo { color: white; font-size: 24px; font-weight: 700; text-decoration: none; margin-left: 10px; transition: 0.3s; }
.logo:hover { color: var(--accent-neon); text-shadow: 0 0 10px var(--accent-neon); }
.nav-links { list-style: none; display: flex; margin-right: 10px; }
.nav-links li { position: relative; margin-left: 15px; }
.nav-links li a { color: white; text-decoration: none; font-weight: 500; padding: 8px 12px; display: block; border-radius: 5px; transition: 0.3s; }
.nav-links li a:hover { background-color: rgba(255, 255, 255, 0.15); transform: scale(1.03); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

.dropdown-content {
    max-height: 0; opacity: 0; visibility: hidden; transition: 0.4s;
    position: absolute; min-width: 180px; top: 100%; right: 0; margin-top: 5px;
    background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; overflow: hidden;
}
.dropdown:hover .dropdown-content { max-height: 500px; opacity: 1; visibility: visible; }
.dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; }
.dropdown-content a:hover { background-color: var(--primary-color); }

/* FORM CARD */
.section-container { width: 100%; max-width: 550px; margin: auto; }
.card {

.header-wrapper { text-align: center; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); padding-bottom: 20px; }
.header-wrapper h1 { font-size: 1.6rem; font-weight: 800; }
.accent-purple { color: var(--accent-purple); text-shadow: 0 0 10px var(--accent-purple); }

.form-group { display: flex; flex-direction: column; gap: 8px; }
.custom-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 12px; color: white; }
.btn-submit-neon { width: 100%; padding: 15px; background: transparent; border: 2px solid var(--accent-neon); color: white; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.4s; }
.btn-submit-neon:hover { background: var(--accent-neon); color: #000; box-shadow: 0 0 25px var(--accent-neon); }

/* KEMBALI KE TENGAH */
