    <div class="calculator-card">
        <div class="tag">CALCULATOR SYSTEM v4.0</div>

        <div class="display" ondblclick="copyToClipboard()">
            <div class="display-border"></div>
            <div class="display-inner"></div>
            <div class="display-content">
                <div id="history-text"></div>
                <div id="display-text">0</div>
            </div>
        </div>

        <div class="cyber-converter">
            <div class="conv-item"><span class="conv-label">BIN</span><span id="bin-text" class="conv-val">0</span></div>
            <div class="conv-item"><span class="conv-label">HEX</span><span id="hex-text" class="conv-val">0</span></div>
        </div>

        <div class="buttons">
            <!-- BARIS 1: EXTENDED TKJ & SCIENTIFIC FEATURES -->
            <button class="btn ext-btn" onclick="calcPower2(); createParticle(event)"><span>2ⁿ</span></button>
            <button class="btn ext-btn" onclick="calcSquare(); createParticle(event)"><span>x²</span></button>
            <button class="btn ext-btn" onclick="calcRoot(); createParticle(event)"><span>√</span></button>
            <button class="btn ext-btn" onclick="appendToDisplay('%'); createParticle(event)"><span>%</span></button>

            <!-- BARIS 2 -->
            <button class="btn operator" onclick="clearDisplay(); createParticle(event)"><span>C</span></button>
            <button class="btn operator" onclick="appendToDisplay('/'); createParticle(event)"><span>/</span></button>
            <button class="btn operator" onclick="appendToDisplay('*'); createParticle(event)"><span>×</span></button>
            <button class="btn operator" onclick="deleteLast(); createParticle(event)"><span>⌫</span></button>
            
            <!-- BARIS 3 -->
            <button class="btn" onclick="appendToDisplay('7'); createParticle(event)"><span>7</span></button>
            <button class="btn" onclick="appendToDisplay('8'); createParticle(event)"><span>8</span></button>
            <button class="btn" onclick="appendToDisplay('9'); createParticle(event)"><span>9</span></button>
            <button class="btn operator" onclick="appendToDisplay('-'); createParticle(event)"><span>-</span></button>
            
            <!-- BARIS 4 -->
            <button class="btn" onclick="appendToDisplay('4'); createParticle(event)"><span>4</span></button>
            <button class="btn" onclick="appendToDisplay('5'); createParticle(event)"><span>5</span></button>
            <button class="btn" onclick="appendToDisplay('6'); createParticle(event)"><span>6</span></button>
            <button class="btn operator" onclick="appendToDisplay('+'); createParticle(event)"><span>+</span></button>
            
            <!-- BARIS 5 & 6 -->
            <button class="btn" onclick="appendToDisplay('1'); createParticle(event)"><span>1</span></button>
            <button class="btn" onclick="appendToDisplay('2'); createParticle(event)"><span>2</span></button>
            <button class="btn" onclick="appendToDisplay('3'); createParticle(event)"><span>3</span></button>
            <button class="btn equal" onclick="calculate(); createParticle(event)"><span>=</span></button>
            
            <button class="btn zero" onclick="appendToDisplay('0'); createParticle(event)"><span>0</span></button>
            <button class="btn" onclick="appendToDisplay('.'); createParticle(event)"><span>.</span></button>
        </div>
